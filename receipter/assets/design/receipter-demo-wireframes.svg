<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800" role="img" aria-labelledby="title desc">
  <title id="title">Receipter demo loop wireframes</title>
  <desc id="desc">Nine coherent wireframe screens for the Receipter judge demo loop.</desc>
  <defs>
    <style>
      text{font-family:Inter,Arial,sans-serif}
      .bg{fill:#f6f8fb}
      .screen{fill:#fff;stroke:#d8e0eb;stroke-width:2}
      .top{fill:#f9fbfd;stroke:#e5ebf3;stroke-width:1}
      .ink{fill:#142033}
      .muted{fill:#68768a}
      .soft{fill:#eef3f8}
      .blue{fill:#2f8cff}
      .teal{fill:#16b8a6}
      .ok{fill:#e8f8ef;stroke:#b9e8cf}
      .warn{fill:#fff6e6;stroke:#f2d396}
      .bad{fill:#fff0f0;stroke:#f0b7b7}
      .line{stroke:#dce4ef;stroke-width:2}
      .darkLine{stroke:#142033;stroke-width:2}
      .btn{fill:#142033}
      .chip{fill:#edf5ff;stroke:#c8dfff}
      .small{font-size:18px}
      .xs{font-size:15px}
      .label{font-size:15px;fill:#68768a;font-weight:700;letter-spacing:.8px}
      .h{font-size:28px;font-weight:800;fill:#142033}
      .body{font-size:18px;fill:#142033}
      .mutedText{font-size:17px;fill:#68768a}
      .num{font-size:20px;fill:#fff;font-weight:800}
    </style>
    <g id="nav">
      <rect class="top" x="0" y="0" width="680" height="54" rx="14"/>
      <circle cx="28" cy="27" r="13" fill="#142033"/>
      <text x="50" y="34" class="ink" font-size="20" font-weight="850">Receipter</text>
      <text x="505" y="34" class="muted" font-size="15" font-weight="700">testnet</text>
      <circle cx="620" cy="27" r="14" fill="#2f8cff"/>
      <circle cx="650" cy="27" r="14" fill="#16b8a6"/>
    </g>
    <g id="check">
      <circle cx="0" cy="0" r="12" fill="#22b86f"/>
      <path d="M-6 0l4 5 9-10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="bang">
      <circle cx="0" cy="0" r="12" fill="#d98713"/>
      <path d="M0-7v9M0 7v.5" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </g>
  </defs>
  <rect class="bg" width="2400" height="1800"/>
  <text x="80" y="82" class="ink" font-size="44" font-weight="850">Receipter judge demo wireframes</text>
  <text x="80" y="122" class="muted" font-size="22">Verify reputation -> Hire agent -> Verify delivery -> Publish receipt -> Passport improves -> Next buyer trusts faster</text>

  <!-- 1 -->
  <g transform="translate(80 170)">
    <rect class="screen" width="680" height="470" rx="22"/>
    <use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">1</text>
    <text x="70" y="98" class="h">Agent Passport Directory</text>
    <rect class="soft" x="30" y="130" width="620" height="44" rx="8"/>
    <text x="48" y="158" class="label">Agent</text><text x="190" y="158" class="label">Score</text><text x="285" y="158" class="label">Verified</text><text x="390" y="158" class="label">Walrus</text><text x="500" y="158" class="label">Sui</text><text x="580" y="158" class="label">Stake</text>
    <g transform="translate(30 194)">
      <rect class="ok" width="620" height="64" rx="10"/><text x="18" y="39" class="body" font-weight="750">Opportunity Scout</text><text x="170" y="39" class="body">842</text><text x="286" y="39" class="body">7</text><text x="395" y="39" class="body">7</text><text x="500" y="39" class="body">6</text><text x="574" y="39" class="body">5 SUI</text>
    </g>
    <g transform="translate(30 274)">
      <rect class="screen" width="620" height="58" rx="10"/><text x="18" y="36" class="body">Protocol Radar</text><text x="170" y="36" class="body">791</text><text x="286" y="36" class="body">4</text><text x="395" y="36" class="body">4</text><text x="500" y="36" class="body">3</text><text x="574" y="36" class="body">3 SUI</text>
    </g>
    <g transform="translate(30 348)">
      <rect class="screen" width="620" height="58" rx="10"/><text x="18" y="36" class="body">Grant Finder</text><text x="170" y="36" class="body">728</text><text x="286" y="36" class="body">3</text><text x="395" y="36" class="body">3</text><text x="500" y="36" class="body">2</text><text x="574" y="36" class="body">2 SUI</text>
    </g>
  </g>

  <!-- 2 -->
  <g transform="translate(860 170)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">2</text><text x="70" y="98" class="h">Opportunity Scout Passport</text>
    <text x="34" y="162" class="ink" font-size="54" font-weight="850">842 / 1000</text>
    <text x="34" y="202" class="mutedText">Safe to hire for research · L3 Passport-bound</text>
    <g transform="translate(34 236)">
      <rect class="ok" width="130" height="70" rx="10"/><text x="18" y="28" class="label">Verified jobs</text><text x="18" y="56" class="h">7</text>
      <rect class="ok" x="150" width="130" height="70" rx="10"/><text x="168" y="28" class="label">Slashes</text><text x="168" y="56" class="h">0</text>
      <rect class="ok" x="300" width="130" height="70" rx="10"/><text x="318" y="28" class="label">Stake</text><text x="318" y="56" class="h">5 SUI</text>
    </g>
    <text x="34" y="350" class="label">Receipt timeline</text>
    <line class="line" x1="52" y1="386" x2="620" y2="386"/><use href="#check" x="70" y="386"/><use href="#check" x="210" y="386"/><use href="#check" x="350" y="386"/><use href="#check" x="490" y="386"/>
    <text x="48" y="430" class="mutedText">This is built from receipts, not reviews.</text>
  </g>

  <!-- 3 -->
  <g transform="translate(1640 170)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">3</text><text x="70" y="98" class="h">Verify Receipt</text>
    <text x="34" y="140" class="mutedText">Receipt: run_20260620_public_research</text>
    <g transform="translate(48 180)">
      <use href="#check"/><text x="28" y="7" class="body">payment digest exists</text>
      <use href="#check" y="36"/><text x="28" y="43" class="body">worker packet hash matches</text>
      <use href="#check" y="72"/><text x="28" y="79" class="body">evidence stored on Walrus</text>
      <use href="#check" y="108"/><text x="28" y="115" class="body">Walrus readback succeeded</text>
      <use href="#check" y="144"/><text x="28" y="151" class="body">memory hash matches</text>
      <use href="#check" y="180"/><text x="28" y="187" class="body">Sui anchor event matches</text>
      <use href="#check" y="216"/><text x="28" y="223" class="body">passport points to latest memory</text>
      <use href="#check" y="252"/><text x="28" y="259" class="body">stake/challenge path exists</text>
    </g>
  </g>

  <!-- 4 -->
  <g transform="translate(80 690)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">4</text><text x="70" y="98" class="h">Create Job</text>
    <text x="34" y="140" class="body" font-weight="750">Scope -> Choose worker -> Pay -> Verify delivery -> Publish receipt</text>
    <rect class="screen" x="34" y="170" width="610" height="70" rx="10"/><text x="54" y="198" class="label">Task</text><text x="54" y="224" class="body">Find Sui AI agent grant opportunities</text>
    <rect class="screen" x="34" y="258" width="610" height="86" rx="10"/><text x="54" y="286" class="label">Acceptance criteria</text><text x="54" y="314" class="body">5 public links · deadline · sponsor · ranked fit</text>
    <rect class="screen" x="34" y="362" width="290" height="60" rx="10"/><text x="54" y="398" class="body">Budget: 0.050 SUI</text>
    <rect class="btn" x="474" y="362" width="170" height="60" rx="10"/><text x="506" y="399" fill="#fff" font-size="18" font-weight="800">Continue</text>
  </g>

  <!-- 5 -->
  <g transform="translate(860 690)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">5</text><text x="70" y="98" class="h">Scope Packet</text>
    <rect class="screen" x="34" y="132" width="400" height="248" rx="12"/><text x="56" y="164" class="label">Worker-visible packet</text><text x="56" y="204" class="body">Task, criteria, budget cap</text><text x="56" y="242" class="mutedText">No private notes included</text><line class="line" x1="56" y1="274" x2="394" y2="274"/><text x="56" y="312" class="mutedText">Packet hash</text><text x="56" y="342" class="body">sha256:8ac4...91fd</text>
    <g transform="translate(470 150)"><use href="#check"/><text x="28" y="7" class="body">Private notes withheld</text><use href="#check" y="52"/><text x="28" y="59" class="body">Secret scan clean</text><use href="#check" y="104"/><text x="28" y="111" class="body">Packet hash locked</text></g>
  </g>

  <!-- 6 -->
  <g transform="translate(1640 690)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">6</text><text x="70" y="98" class="h">Choose Worker</text>
    <g transform="translate(34 135)">
      <rect class="ok" width="610" height="86" rx="12"/><text x="20" y="34" class="body" font-weight="800">Opportunity Scout</text><text x="20" y="63" class="mutedText">0.035 SUI · 24h · 7 jobs · 96% support · 5 SUI stake · Verdict: available</text>
      <rect class="warn" y="108" width="610" height="72" rx="12"/><text x="20" y="152" class="body">Expedited Scout · Blocked: above budget</text>
      <rect class="bad" y="202" width="610" height="72" rx="12"/><text x="20" y="246" class="body">Private Context Scout · Blocked: requested private data</text>
    </g>
  </g>

  <!-- 7 -->
  <g transform="translate(80 1210)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">7</text><text x="70" y="98" class="h">Payment Intent</text>
    <rect class="screen" x="34" y="134" width="610" height="210" rx="12"/>
    <text x="60" y="174" class="label">Worker</text><text x="250" y="174" class="body">Opportunity Scout</text>
    <text x="60" y="214" class="label">Run ID</text><text x="250" y="214" class="body">run_20260620_7x9</text>
    <text x="60" y="254" class="label">Amount</text><text x="250" y="254" class="body">0.035 SUI</text>
    <text x="60" y="294" class="label">Settlement rule</text><text x="250" y="294" class="body">publish only if verifier passes</text>
    <text x="60" y="334" class="label">Verifier policy</text><text x="250" y="334" class="body">source-backed research v1</text>
    <rect class="btn" x="34" y="376" width="220" height="58" rx="10"/><text x="64" y="413" fill="#fff" font-size="18" font-weight="800">Sign payment intent</text>
  </g>

  <!-- 8 -->
  <g transform="translate(860 1210)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">8</text><text x="70" y="98" class="h">Verify Delivery</text>
    <rect class="screen" x="34" y="132" width="610" height="86" rx="12"/><text x="54" y="166" class="body" font-weight="800">Source-backed claims</text><text x="54" y="196" class="mutedText">5 supported / 5 claims · 5 sources</text>
    <rect class="screen" x="34" y="236" width="610" height="70" rx="12"/><text x="54" y="279" class="body">Acceptance coverage: deadline, sponsor, fit, ranked recommendation</text>
    <rect class="ok" x="34" y="330" width="176" height="48" rx="24"/><text x="61" y="361" class="body">Ready to publish</text>
    <rect class="warn" x="226" y="330" width="150" height="48" rx="24"/><text x="254" y="361" class="body">Needs review</text>
    <rect class="bad" x="392" y="330" width="112" height="48" rx="24"/><text x="422" y="361" class="body">Rejected</text>
  </g>

  <!-- 9 -->
  <g transform="translate(1640 1210)">
    <rect class="screen" width="680" height="470" rx="22"/><use href="#nav"/>
    <circle class="blue" cx="36" cy="88" r="18"/><text x="30" y="95" class="num">9</text><text x="70" y="98" class="h">Receipt Published</text>
    <text x="34" y="152" class="ink" font-size="38" font-weight="850">Verified receipt published</text>
    <g transform="translate(50 205)"><use href="#check"/><text x="32" y="7" class="body">Store full evidence on Walrus</text><use href="#check" y="44"/><text x="32" y="51" class="body">Read it back and hash-check it</text><use href="#check" y="88"/><text x="32" y="95" class="body">Anchor compact receipt on Sui</text><use href="#check" y="132"/><text x="32" y="139" class="body">Update AgentPassport</text></g>
    <rect class="chip" x="34" y="382" width="122" height="42" rx="10"/><text x="55" y="408" class="body">Walrus blob</text>
    <rect class="chip" x="170" y="382" width="110" height="42" rx="10"/><text x="192" y="408" class="body">Sui anchor</text>
    <rect class="chip" x="294" y="382" width="150" height="42" rx="10"/><text x="315" y="408" class="body">proof.json</text>
    <rect class="btn" x="460" y="382" width="152" height="42" rx="10"/><text x="486" y="409" fill="#fff" font-size="17" font-weight="800">Share passport</text>
  </g>
</svg>
