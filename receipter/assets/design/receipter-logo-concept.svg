<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Receipter logo concept</title>
  <desc id="desc">A vector-friendly logo concept for Receipter, combining a receipt, verification check, and proof nodes.</desc>
  <defs>
    <style>
      .bg{fill:#f7fafc}
      .ink{fill:#142033}
      .muted{fill:#6a7688}
      .line{stroke:#d7dee8;stroke-width:2}
      .grid{stroke:#e9eef5;stroke-width:1}
      .blue{fill:#2f8cff}
      .teal{fill:#16b8a6}
      .green{fill:#22b86f}
      .card{fill:#ffffff;stroke:#d9e1ec;stroke-width:2}
      .markLine{fill:none;stroke:#142033;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}
      .check{fill:none;stroke:#22b86f;stroke-width:20;stroke-linecap:round;stroke-linejoin:round}
      text{font-family:Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <g opacity=".9">
    <path class="grid" d="M120 120H1480M120 220H1480M120 320H1480M120 420H1480M120 520H1480M120 620H1480M120 720H1480M120 820H1480"/>
    <path class="grid" d="M200 80V900M320 80V900M440 80V900M560 80V900M680 80V900M800 80V900M920 80V900M1040 80V900M1160 80V900M1280 80V900M1400 80V900"/>
  </g>
  <text x="120" y="110" class="muted" font-size="24" font-weight="700" letter-spacing="2">RECEIPTER BRAND CONCEPT</text>
  <text x="120" y="154" class="ink" font-size="46" font-weight="800">Receipt-proof identity for agent work</text>

  <g transform="translate(245 260)">
    <rect class="card" x="0" y="0" width="1110" height="300" rx="28"/>
    <g transform="translate(80 54)">
      <path class="markLine" d="M45 10h145c22 0 40 18 40 40v122l-34-20-34 20-34-20-34 20-34-20-34 20V50c0-22 18-40 40-40Z"/>
      <path class="markLine" d="M80 65h102M80 112h72"/>
      <path class="check" d="M108 168l39 39 90-104"/>
      <circle class="blue" cx="255" cy="42" r="18"/>
      <circle class="teal" cx="286" cy="112" r="18"/>
      <path d="M263 58l17 38" stroke="#16b8a6" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="390" y="140" class="ink" font-size="96" font-weight="850">Receipter</text>
    <text x="396" y="190" class="muted" font-size="28" font-weight="600">proof loop for paid agent work</text>
  </g>

  <g transform="translate(245 640)">
    <rect class="card" x="0" y="0" width="300" height="220" rx="20"/>
    <g transform="translate(78 34) scale(.62)">
      <path class="markLine" d="M45 10h145c22 0 40 18 40 40v122l-34-20-34 20-34-20-34 20-34-20-34 20V50c0-22 18-40 40-40Z"/>
      <path class="markLine" d="M80 65h102M80 112h72"/>
      <path class="check" d="M108 168l39 39 90-104"/>
      <circle class="blue" cx="255" cy="42" r="18"/>
      <circle class="teal" cx="286" cy="112" r="18"/>
      <path d="M263 58l17 38" stroke="#16b8a6" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="80" y="186" class="muted" font-size="20" font-weight="700">Icon-only</text>
  </g>

  <g transform="translate(650 640)">
    <rect class="card" x="0" y="0" width="430" height="220" rx="20"/>
    <g transform="translate(44 58) scale(.38)">
      <path class="markLine" d="M45 10h145c22 0 40 18 40 40v122l-34-20-34 20-34-20-34 20-34-20-34 20V50c0-22 18-40 40-40Z"/>
      <path class="markLine" d="M80 65h102M80 112h72"/>
      <path class="check" d="M108 168l39 39 90-104"/>
      <circle class="blue" cx="255" cy="42" r="18"/>
      <circle class="teal" cx="286" cy="112" r="18"/>
      <path d="M263 58l17 38" stroke="#16b8a6" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="180" y="120" class="ink" font-size="50" font-weight="850">Receipter</text>
    <text x="80" y="186" class="muted" font-size="20" font-weight="700">Horizontal lockup</text>
  </g>

  <g transform="translate(1185 640)">
    <rect x="0" y="0" width="220" height="220" rx="44" fill="#142033"/>
    <g transform="translate(42 38) scale(.56)">
      <path d="M45 10h145c22 0 40 18 40 40v122l-34-20-34 20-34-20-34 20-34-20-34 20V50c0-22 18-40 40-40Z" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M80 65h102M80 112h72" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M108 168l39 39 90-104" fill="none" stroke="#22b86f" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="255" cy="42" r="18" fill="#2f8cff"/>
      <circle cx="286" cy="112" r="18" fill="#16b8a6"/>
      <path d="M263 58l17 38" stroke="#16b8a6" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="42" y="260" class="muted" font-size="20" font-weight="700">App icon</text>
  </g>

  <g transform="translate(120 900)">
    <circle class="ink" cx="0" cy="0" r="14"/><text x="28" y="8" class="muted" font-size="20">Ink #142033</text>
    <circle class="blue" cx="230" cy="0" r="14"/><text x="258" y="8" class="muted" font-size="20">Sui blue</text>
    <circle class="teal" cx="430" cy="0" r="14"/><text x="458" y="8" class="muted" font-size="20">Walrus teal</text>
    <circle class="green" cx="665" cy="0" r="14"/><text x="693" y="8" class="muted" font-size="20">Verified green</text>
  </g>
</svg>
